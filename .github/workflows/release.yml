name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: update-sync

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux x86_64
            asset_suffix: linux-x86_64
            archive_ext: tar.gz
            binary_name: update-sync
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x86_64
            asset_suffix: windows-x86_64
            archive_ext: zip
            binary_name: update-sync.exe
          - os: macos-14
            target: aarch64-apple-darwin
            label: macOS Apple Silicon
            asset_suffix: macos-aarch64
            archive_ext: tar.gz
            binary_name: update-sync
          # Intel x86_64: macos-13 was retired; use macos-15-intel (see GitHub runner-images changelog).
          - os: macos-15-intel
            target: x86_64-apple-darwin
            label: macOS Intel
            asset_suffix: macos-x86_64
            archive_ext: tar.gz
            binary_name: update-sync

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          asset_name="${BINARY_NAME}-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${{ matrix.binary_name }}"
          tar -C dist -czf "${asset_name}" "${{ matrix.binary_name }}"

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $assetName = "$env:BINARY_NAME-$env:GITHUB_REF_NAME-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary_name }}" "dist\${{ matrix.binary_name }}"
          Compress-Archive -Path "dist\${{ matrix.binary_name }}" -DestinationPath $assetName -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}
          path: ${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.${{ matrix.archive_ext }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
